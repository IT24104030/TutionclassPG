<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/L Tuition Management System</title>
    <link rel="icon" href="data:,">
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="vendor/fontawesome/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: radial-gradient(circle at 20% 20%, #253772 0%, #172754 40%, #101a3b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 24px;
            overflow: hidden;
        }

        .login-stage {
            width: min(1220px, 94vw);
            height: min(680px, 88vh);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
            background: #0e1a3f;
        }

        .stage-left {
            position: absolute;
            inset: 0 auto 0 0;
            width: 34%;
            background:
                radial-gradient(circle at 10% 10%, rgba(35,73,162,0.55), transparent 45%),
                repeating-radial-gradient(circle at 20% 50%, rgba(63,121,255,0.16), rgba(63,121,255,0.16) 2px, transparent 2px, transparent 20px),
                linear-gradient(180deg, #081334 0%, #030a1f 100%);
        }

        .stage-right {
            position: absolute;
            inset: 0 0 0 33%;
            background:
                linear-gradient(rgba(243,248,255,0.84), rgba(243,248,255,0.84)),
                url('https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #102149;
            text-align: center;
        }

        .hero-title {
            font-size: clamp(2.4rem, 4vw, 4.2rem);
            line-height: 1.08;
            font-weight: 800;
            letter-spacing: 0.2px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.35);
        }

        .hero-footer {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.78rem;
            color: rgba(14, 28, 68, 0.85);
        }

        .login-card {
            position: absolute;
            left: clamp(28px, 12%, 150px);
            top: 50%;
            transform: translateY(-50%);
            z-index: 3;
            background: linear-gradient(135deg, rgba(20,102,201,0.96), rgba(12,67,148,0.93));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.24);
            border-radius: 14px;
            padding: 28px 26px 24px;
            width: 360px;
            box-shadow: 0 18px 36px rgba(0,0,0,0.32);
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.95);
        }

        .login-logo {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.12);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: white;
            border: 1px solid rgba(255,255,255,0.45);
        }

        .brand-text {
            line-height: 1.2;
        }

        .brand-title {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .brand-sub {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.72);
        }

        .login-title {
            color: white;
            font-weight: 700;
            font-size: 2rem;
            margin: 0 0 16px;
        }

        .login-card .form-label { color: rgba(255,255,255,0.8); font-size: 0.85rem; font-weight: 500; }
        .login-card .form-control {
            background: rgba(250,253,255,0.95);
            border: 1px solid rgba(6,44,105,0.35);
            color: #173367;
            border-radius: 6px;
            padding: 11px 12px;
            transition: all 0.3s;
        }
        .login-card .form-control:focus {
            background: #ffffff;
            border-color: #3f91ff;
            color: #173367;
            box-shadow: 0 0 0 0.14rem rgba(63,145,255,0.25);
        }
        .login-card .form-control::placeholder { color: rgba(20,42,82,0.55); }

        .input-group-text {
            background: rgba(250,253,255,0.95);
            border: 1px solid rgba(6,44,105,0.35);
            color: rgba(20,42,82,0.6);
            border-radius: 6px;
        }

        .btn-login {
            background: linear-gradient(135deg, #25a0ff, #1180e2);
            border: none; color: white;
            padding: 10px 16px;
            border-radius: 7px;
            font-weight: 600;
            font-size: 0.95rem;
            min-width: 100px;
            transition: all 0.25s;
        }
        .btn-login:hover {
            filter: brightness(1.05);
            color: white;
        }

        .btn-forgot {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.9);
            font-size: 0.86rem;
            text-decoration: none;
            padding: 8px 0;
        }

        .alert-login {
            background: rgba(220,53,69,0.2);
            border: 1px solid rgba(220,53,69,0.4);
            color: #ff6b7a; border-radius: 10px; font-size: 0.85rem;
        }

        .login-help {
            color: rgba(255,255,255,0.75);
            font-size: 0.8rem;
            margin-top: 16px;
        }

        @media (max-width: 992px) {
            .login-stage {
                height: auto;
                min-height: 94vh;
            }

            .stage-left {
                width: 100%;
                height: 42%;
                inset: 0 0 auto 0;
            }

            .stage-right {
                inset: 0;
                padding: 20px;
                justify-content: flex-end;
                padding-bottom: 30px;
            }

            .hero-title {
                font-size: 2rem;
                margin-bottom: 150px;
            }

            .login-card {
                position: absolute;
                left: 50%;
                top: 52%;
                transform: translate(-50%, -50%);
                width: min(92vw, 380px);
            }

            .hero-footer {
                position: static;
                transform: none;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="login-stage">
        <div class="stage-left"></div>
        <div class="stage-right">
            <h1 class="hero-title">Learning<br>Management<br>System</h1>
            <div class="hero-footer">© New Learning Management System 2026. All rights reserved.</div>
        </div>

        <div class="login-card">
            <div class="brand-row">
                <div class="login-logo"><i class="fas fa-graduation-cap"></i></div>
                <div class="brand-text">
                    <div class="brand-title">A/L Tuition Manager</div>
                    <div class="brand-sub">Smart class operations platform</div>
                </div>
            </div>

            <h2 class="login-title">Log in</h2>

            <div id="loginAlert" class="alert alert-login d-none mb-3" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span id="loginAlertMsg">Invalid credentials</span>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <div class="input-group">
                        <input type="text" id="username" class="form-control"
                               placeholder="Username" required autocomplete="username">
                    </div>
                </div>
                <div class="mb-3">
                    <div class="input-group">
                        <input type="password" id="password" class="form-control"
                               placeholder="Password" required autocomplete="current-password">
                        <button class="btn input-group-text" type="button" id="togglePwd">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="d-flex align-items-center justify-content-between gap-2">
                    <button type="submit" class="btn btn-login" id="loginBtn">
                        <span id="loginBtnText">Login</span>
                        <span id="loginBtnLoader" class="d-none">
                            <span class="spinner-border spinner-border-sm me-2"></span>Logging in...
                        </span>
                    </button>
                    <a href="#" class="btn-forgot">Forgot Password?</a>
                </div>

                <p class="login-help mb-0">
                    Default login: <strong>admin</strong> / <strong>Admin@123</strong>
                </p>
            </form>
        </div>
    </div>

    <script>
        // ====== Toggle Password ======
        document.getElementById('togglePwd').addEventListener('click', () => {
            const pwd  = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        // ====== Login ======
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const alert_el = document.getElementById('loginAlert');
            const alertMsg = document.getElementById('loginAlertMsg');
            const btnText  = document.getElementById('loginBtnText');
            const btnLoad  = document.getElementById('loginBtnLoader');

            alert_el.classList.add('d-none');
            btnText.classList.add('d-none');
            btnLoad.classList.remove('d-none');

            try {
                const res = await fetch('http://localhost:8081/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!res.ok) {
                    const err = await res.json();
                    alertMsg.textContent = err.message || 'Invalid credentials';
                    alert_el.classList.remove('d-none');
                    return;
                }

                const data = await res.json();
                localStorage.setItem('token',    data.token);
                localStorage.setItem('user',     JSON.stringify(data));
                window.location.href = 'dashboard.html';

            } catch (err) {
                alertMsg.textContent = 'Cannot connect to server. Please try again.';
                alert_el.classList.remove('d-none');
            } finally {
                btnText.classList.remove('d-none');
                btnLoad.classList.add('d-none');
            }
        });

        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>

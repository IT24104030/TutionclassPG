# ============================================================
# A/L Tuition Management System - Application Properties
# ============================================================

# Server
server.port=8084
server.servlet.context-path=/api

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tuition_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:TuitionManagementSystemSecretKey2026SuperLongSecureKey!}
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=uploads/

# Logging
logging.level.com.tuition=DEBUG
logging.level.org.springframework.security=INFO

# Chatbot (optional)
# - Works without any key (falls back to rules-based bot)
# - For OpenAI: set chatbot.openai.apiKey or env var CHATBOT_OPENAI_APIKEY
chatbot.provider=auto
chatbot.openai.baseUrl=https://api.openai.com/v1
chatbot.openai.model=gpt-4o-mini
chatbot.openai.temperature=0.2
chatbot.openai.apiKey=
